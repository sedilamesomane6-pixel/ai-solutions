services:
  - type: web
    name: ai-solutions-dash
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13

  - type: cron-job
    name: sales-analysis-job
    schedule: "0 0 * * *"
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python sales_analysis.py